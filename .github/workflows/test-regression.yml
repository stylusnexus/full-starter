# Regression Tests — comprehensive suite
#
# Default: manual trigger only.
# Uncomment the 'schedule' trigger for nightly runs.
#
# Cost note: Full regression can use 10-30 minutes depending on test count.

name: Regression Tests

on:
  workflow_dispatch:
  # schedule:           # Uncomment for nightly runs
  #   - cron: '0 6 * * *'  # Daily at 6am UTC

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium

      # Uncomment and adjust for your app:
      # - name: Build and start app
      #   run: npm run build && npm start &
      # - name: Wait for app
      #   run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run regression tests
        run: npx playwright test --grep @regression
        env:
          E2E_BYPASS_AUTH: '1'
          BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 14

      - name: Run experiment baseline check
        run: npx tsx scripts/experiment-baseline.ts
        continue-on-error: true
